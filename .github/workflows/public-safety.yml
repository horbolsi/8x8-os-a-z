name: Public Safety

on:
  push:
    branches: [master, security/public-topology-sanitization-20260723]
  pull_request:

permissions:
  contents: read

jobs:
  public-safety:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Scan tracked public text without printing matched values
        shell: bash
        run: |
          python3 - <<'PY'
          from __future__ import annotations

          import pathlib
          import re
          import subprocess
          import sys

          excluded = {
              '.github/workflows/public-safety.yml',
          }
          patterns = {
              'PRIVATE_KEY_BLOCK': re.compile(r'-----BEGIN (?:RSA |EC |OPENSSH |PGP )?PRIVATE KEY-----'),
              'GITHUB_TOKEN': re.compile(r'gh[pousr]_[A-Za-z0-9_]{20,}'),
              'OPENAI_KEY': re.compile(r'sk-(?:proj-)?[A-Za-z0-9_-]{20,}'),
              'TELEGRAM_BOT_TOKEN': re.compile(r'(?<!\d)\d{8,12}:[A-Za-z0-9_-]{30,}'),
              'AWS_ACCESS_KEY': re.compile(r'AKIA[0-9A-Z]{16}'),
              'PRIVATE_RUNTIME_PATH': re.compile(r'(?:/root/|/data/data/com\.termux/|\.hermes(?:/|\b))'),
              'PRIVATE_PROCESS_TOPOLOGY': re.compile(r'\b(?:runsv|svlogd|proot-distro|MASTER_BOT_CONTROLLER\.py|private_bot\.py)\b'),
          }

          tracked = subprocess.check_output(['git', 'ls-files', '-z']).split(b'\0')
          findings: list[tuple[str, str]] = []
          for raw in tracked:
              if not raw:
                  continue
              rel = raw.decode('utf-8', 'surrogateescape')
              if rel in excluded:
                  continue
              path = pathlib.Path(rel)
              try:
                  if path.stat().st_size > 2_000_000:
                      continue
                  data = path.read_bytes()
              except OSError:
                  continue
              if b'\0' in data[:8192]:
                  continue
              text = data.decode('utf-8', 'replace')
              for name, pattern in patterns.items():
                  if pattern.search(text):
                      findings.append((rel, name))

          if findings:
              print('PUBLIC_SAFETY_SCAN=FAIL')
              for path, pattern_class in sorted(set(findings)):
                  print(f'finding path={path} class={pattern_class}')
              sys.exit(1)

          print('PUBLIC_SAFETY_SCAN=PASS')
          print('SECRET_VALUES_PRINTED=false')
          print('PRIVATE_TOPOLOGY_PRINTED=false')
          PY

      - name: Compile public Python sources
        shell: bash
        run: |
          python3 - <<'PY'
          import pathlib
          import py_compile

          count = 0
          for path in pathlib.Path('.').rglob('*.py'):
              if '.git' in path.parts:
                  continue
              py_compile.compile(str(path), doraise=True)
              count += 1
          print(f'PYTHON_FILES_COMPILED={count}')
          PY
